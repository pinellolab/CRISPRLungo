        text-align: center;

        color: #495057;
    }
    .arrow-down {

        transform: rotate(45deg);
        border: solid #495057;
        border-width: 0 2px 2px 0;
        padding: 5px;
        margin-top: 5px;
    }
    .range-container {
        width: 70%;
        min-width: 420px;
        max-width: 800px;
        margin: 0 auto;
        padding: 15px;
        background-color: #ffffff;
        border: 2px solid #ced4da;
        border-top: none;

    .form-label {
